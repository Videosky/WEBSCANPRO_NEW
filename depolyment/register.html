<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WebScanPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --secondary: #8B5CF6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --light: #F9FAFB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            background: var(--primary);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            opacity: 0.9;
        }

        .register-content {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 42px;
            background: none;
            border: none;
            color: #6B7280;
            cursor: pointer;
            font-size: 1rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            border-radius: 2px;
            background: #E5E7EB;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-weak {
            background-color: var(--danger);
            width: 25%;
        }

        .strength-medium {
            background-color: var(--warning);
            width: 50%;
        }

        .strength-strong {
            background-color: var(--success);
            width: 75%;
        }

        .strength-very-strong {
            background-color: var(--success);
            width: 100%;
        }

        .password-requirements {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #6B7280;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .requirement.met {
            color: var(--success);
        }

        .requirement.unmet {
            color: #6B7280;
        }

        .requirement i {
            font-size: 0.7rem;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input {
            margin-top: 0.25rem;
        }

        .checkbox-group label {
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 0.875rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
            transform: none;
        }

        .register-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E7EB;
        }

        .register-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .register-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: #FEF2F2;
            color: var(--danger);
            border: 1px solid #FECACA;
        }

        .alert-success {
            background: #F0FDF4;
            color: var(--success);
            border: 1px solid #BBF7D0;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .input-error {
            border-color: var(--danger) !important;
        }

        .input-success {
            border-color: var(--success) !important;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                WebScanPro
            </div>
            <p>Create your security account</p>
        </div>
        <div class="register-content">
            <div class="alert alert-error" id="error-alert"></div>
            <div class="alert alert-success" id="success-alert"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required>
                    <div class="username-feedback" style="font-size: 0.8rem; margin-top: 0.25rem;"></div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                    <button type="button" class="password-toggle" id="password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="password-strength-bar"></div>
                    </div>
                    <div class="password-requirements">
                        <div class="requirement unmet" id="length-req">
                            <i class="fas fa-circle"></i>
                            At least 8 characters
                        </div>
                        <div class="requirement unmet" id="uppercase-req">
                            <i class="fas fa-circle"></i>
                            Contains uppercase letter
                        </div>
                        <div class="requirement unmet" id="lowercase-req">
                            <i class="fas fa-circle"></i>
                            Contains lowercase letter
                        </div>
                        <div class="requirement unmet" id="number-req">
                            <i class="fas fa-circle"></i>
                            Contains number
                        </div>
                        <div class="requirement unmet" id="special-req">
                            <i class="fas fa-circle"></i>
                            Contains special character
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required>
                    <button type="button" class="password-toggle" id="confirm-password-toggle">
                        <i class="fas fa-eye"></i>
                    </button>
                    <div class="password-match" style="font-size: 0.8rem; margin-top: 0.25rem;"></div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a></label>
                </div>
                <button type="submit" class="btn btn-primary" id="register-btn">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>
            
            <div class="register-footer">
                <p>Already have an account? <a href="/login">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const passwordToggle = document.getElementById('password-toggle');
            const confirmPasswordToggle = document.getElementById('confirm-password-toggle');
            const passwordStrengthBar = document.getElementById('password-strength-bar');
            const registerBtn = document.getElementById('register-btn');
            const termsCheckbox = document.getElementById('terms');
            
            // Password visibility toggle
            passwordToggle.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            confirmPasswordToggle.addEventListener('click', function() {
                const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPasswordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // Password strength indicator
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                checkPasswordStrength(password);
                checkPasswordRequirements(password);
            });
            
            // Confirm password validation
            confirmPasswordInput.addEventListener('input', function() {
                const password = passwordInput.value;
                const confirmPassword = this.value;
                
                const matchIndicator = document.querySelector('.password-match');
                
                if (confirmPassword === '') {
                    matchIndicator.textContent = '';
                    this.classList.remove('input-error', 'input-success');
                } else if (password === confirmPassword) {
                    matchIndicator.textContent = 'Passwords match';
                    matchIndicator.style.color = 'var(--success)';
                    this.classList.remove('input-error');
                    this.classList.add('input-success');
                } else {
                    matchIndicator.textContent = 'Passwords do not match';
                    matchIndicator.style.color = 'var(--danger)';
                    this.classList.remove('input-success');
                    this.classList.add('input-error');
                }
            });
            
            // Username availability check (simulated)
            usernameInput.addEventListener('blur', function() {
                const username = this.value;
                const feedback = document.querySelector('.username-feedback');
                
                if (username.length < 3) {
                    feedback.textContent = 'Username must be at least 3 characters';
                    feedback.style.color = 'var(--danger)';
                    this.classList.add('input-error');
                    return;
                }
                
                // Simulate API call to check username availability
                setTimeout(() => {
                    // For demo purposes, assume usernames "admin", "user", and "test" are taken
                    const takenUsernames = ['admin', 'user', 'test'];
                    
                    if (takenUsernames.includes(username.toLowerCase())) {
                        feedback.textContent = 'Username is already taken';
                        feedback.style.color = 'var(--danger)';
                        this.classList.add('input-error');
                    } else {
                        feedback.textContent = 'Username is available';
                        feedback.style.color = 'var(--success)';
                        this.classList.remove('input-error');
                        this.classList.add('input-success');
                    }
                }, 500);
            });
            
            // Form submission
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = usernameInput.value;
                const email = emailInput.value;
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // Hide previous alerts
                hideAlerts();
                
                // Validation
                if (!username || !email || !password || !confirmPassword || !termsCheckbox.checked) {
                    showError('Please fill in all fields and accept the terms');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }
                
                if (password.length < 6) {
                    showError('Password must be at least 6 characters long');
                    return;
                }
                
                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('Please enter a valid email address');
                    return;
                }
                
                try {
                    // Show loading state
                    registerBtn.innerHTML = '<div class="loading"></div> Creating Account...';
                    registerBtn.disabled = true;
                    
                    const response = await fetch('/api/auth/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: username,
                            email: email,
                            password: password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        showSuccess('Account created successfully! Redirecting to login...');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showError(data.error || 'Registration failed');
                    }
                } catch (error) {
                    showError('Network error. Please try again.');
                } finally {
                    // Reset button
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    registerBtn.disabled = false;
                }
            });

            function checkPasswordStrength(password) {
                let strength = 0;
                
                // Length check
                if (password.length >= 8) strength += 1;
                
                // Character variety checks
                if (/[a-z]/.test(password)) strength += 1;
                if (/[A-Z]/.test(password)) strength += 1;
                if (/[0-9]/.test(password)) strength += 1;
                if (/[^A-Za-z0-9]/.test(password)) strength += 1;
                
                // Update strength bar
                passwordStrengthBar.className = 'password-strength-bar';
                
                if (password.length === 0) {
                    passwordStrengthBar.style.width = '0%';
                } else if (strength <= 2) {
                    passwordStrengthBar.classList.add('strength-weak');
                } else if (strength === 3) {
                    passwordStrengthBar.classList.add('strength-medium');
                } else if (strength === 4) {
                    passwordStrengthBar.classList.add('strength-strong');
                } else {
                    passwordStrengthBar.classList.add('strength-very-strong');
                }
            }
            
            function checkPasswordRequirements(password) {
                const lengthReq = document.getElementById('length-req');
                const uppercaseReq = document.getElementById('uppercase-req');
                const lowercaseReq = document.getElementById('lowercase-req');
                const numberReq = document.getElementById('number-req');
                const specialReq = document.getElementById('special-req');
                
                // Check each requirement
                if (password.length >= 8) {
                    lengthReq.classList.remove('unmet');
                    lengthReq.classList.add('met');
                    lengthReq.innerHTML = '<i class="fas fa-check-circle"></i> At least 8 characters';
                } else {
                    lengthReq.classList.remove('met');
                    lengthReq.classList.add('unmet');
                    lengthReq.innerHTML = '<i class="fas fa-circle"></i> At least 8 characters';
                }
                
                if (/[A-Z]/.test(password)) {
                    uppercaseReq.classList.remove('unmet');
                    uppercaseReq.classList.add('met');
                    uppercaseReq.innerHTML = '<i class="fas fa-check-circle"></i> Contains uppercase letter';
                } else {
                    uppercaseReq.classList.remove('met');
                    uppercaseReq.classList.add('unmet');
                    uppercaseReq.innerHTML = '<i class="fas fa-circle"></i> Contains uppercase letter';
                }
                
                if (/[a-z]/.test(password)) {
                    lowercaseReq.classList.remove('unmet');
                    lowercaseReq.classList.add('met');
                    lowercaseReq.innerHTML = '<i class="fas fa-check-circle"></i> Contains lowercase letter';
                } else {
                    lowercaseReq.classList.remove('met');
                    lowercaseReq.classList.add('unmet');
                    lowercaseReq.innerHTML = '<i class="fas fa-circle"></i> Contains lowercase letter';
                }
                
                if (/[0-9]/.test(password)) {
                    numberReq.classList.remove('unmet');
                    numberReq.classList.add('met');
                    numberReq.innerHTML = '<i class="fas fa-check-circle"></i> Contains number';
                } else {
                    numberReq.classList.remove('met');
                    numberReq.classList.add('unmet');
                    numberReq.innerHTML = '<i class="fas fa-circle"></i> Contains number';
                }
                
                if (/[^A-Za-z0-9]/.test(password)) {
                    specialReq.classList.remove('unmet');
                    specialReq.classList.add('met');
                    specialReq.innerHTML = '<i class="fas fa-check-circle"></i> Contains special character';
                } else {
                    specialReq.classList.remove('met');
                    specialReq.classList.add('unmet');
                    specialReq.innerHTML = '<i class="fas fa-circle"></i> Contains special character';
                }
            }
        });

        function showError(message) {
            const alert = document.getElementById('error-alert');
            alert.textContent = message;
            alert.style.display = 'block';
        }

        function showSuccess(message) {
            const alert = document.getElementById('success-alert');
            alert.textContent = message;
            alert.style.display = 'block';
        }

        function hideAlerts() {
            document.getElementById('error-alert').style.display = 'none';
            document.getElementById('success-alert').style.display = 'none';
        }

        // Check if already logged in
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/auth/status');
                const data = await response.json();
                
                if (data.authenticated) {
                    window.location.href = '/dashboard';
                }
            } catch (error) {
                // Ignore errors on register page
            }
        }

        // Check auth status on page load
        checkAuthStatus();
    </script>
</body>
</html>
